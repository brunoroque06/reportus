[project]
name = "reportus"
version = "0.1.0"
dependencies = ["python-dateutil==2.9.0.post0", "streamlit==1.55.0"]

[project.optional-dependencies]
dev = [
  "pyright==1.1.408",
  "ruff==0.15.5",
  "types-python-dateutil==2.9.0.20260305",
  "watchdog==6.0.0",
]
test = [
  "playwright==1.58.0",
  "pytest==9.0.2",
  "pytest-playwright==0.7.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pyright]
reportUnknownLambdaType = false
typeCheckingMode = "strict"
venvPath = "."
venv = ".venv"

[tool.ruff]
lint.ignore = ["E501", "E741"]
